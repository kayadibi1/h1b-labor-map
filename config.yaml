# config.yaml — pipeline-level defaults
# All rule values are dated + sourced. Update via Phase 0 each quarterly re-run.
# Mirror of the DEFAULTS REFERENCE section of labor_market_h1b_map_blueprint.md.

meta:
  config_version: "1.0.0"
  last_phase0_run: "2026-05-27"
  notes: |
    Numeric knobs live here so scoring.py never hardcodes them.
    Rule values carry source + date so an auditor can re-verify.

# ----------------------------------------------------------------------------
# Time windows
# ----------------------------------------------------------------------------
windows:
  window_years_lca: 4         # spans pre/post-2024 beneficiary-centric rule
  window_years_uscis: 4
  demand_lookback_quarters: 8 # JOLTS/CES short window
  layoff_lookback_months: 12  # WARN recency cutoff

# ----------------------------------------------------------------------------
# Sample-size dampeners (split per branch — see Realism Scoring section)
# ----------------------------------------------------------------------------
dampeners:
  n_threshold_capexempt: 3    # think-tank scale; lower so the lane isn't masked
  n_threshold_capsubject: 10  # ~2.5/yr; below this is one-off accommodation

# ----------------------------------------------------------------------------
# H-1B rules — VERIFY each quarter in Phase 0.3
# ----------------------------------------------------------------------------
rules:
  cap_regular:
    value: 65000
    source: "8 USC 1184(g)(1)(A)(vii)"
    verified_at: "2026-05-27"
  cap_masters_advanced_degree:
    value: 20000
    source: "8 USC 1184(g)(5)(C)"
    verified_at: "2026-05-27"
  lottery_selection_rate_fy2026:
    value: 0.353
    source: "USCIS FY2026 selection numbers: 118,660 / 336,153 = 35.3% (Fragomen, Envoy Global, Ogletree confirmations)"
    verified_at: "2026-05-27"
    notes: "Under beneficiary-centric rule, pre-wage-weighting"
  lottery_selection_rate_fy2025:
    value: 0.29
    source: "USCIS FY2025 reported selection rate ~29% under beneficiary-centric"
    verified_at: "2026-05-27"
  beneficiary_centric_rule_effective_fy: 2025
  regime_split_pre_window: "FY2022-FY2024"
  regime_split_post_window: "FY2025+"

  # ------------------------------------------------------------------------
  # WAGE-WEIGHTED LOTTERY (effective FY2027 registration onwards)
  # Federal Register, 90 FR (Dec 29, 2025), 2025-23853. Effective Feb 27, 2026.
  # Level IV: 4 entries; Level III: 3; Level II: 2; Level I: 1.
  # This compounds with beneficiary-centric selection.
  # ------------------------------------------------------------------------
  wage_weighted_lottery_effective_fy: 2027
  wage_weighted_lottery_source: "90 FR, Dec 29 2025 (2025-23853); effective 2026-02-27"
  wage_level_lottery_entries:
    "1": 1
    "2": 2
    "3": 3
    "4": 4
  # Approximate per-level adjusted selection probability for an applicant
  # going into a weighted FY2027+ lottery, assuming historical wage-level
  # distribution (Level 1: 25%, Level 2: 50%, Level 3: 20%, Level 4: 5%).
  # mean_weight = 1*0.25 + 2*0.50 + 3*0.20 + 4*0.05 = 2.05
  # P(selection | level L) ≈ base_rate × L / mean_weight (capped at 1.0).
  # These are recomputed in scoring.py; values here are pre-baked defaults.
  wage_level_adjusted_selection_rate_fy2027:
    "1": 0.17       # 1/2.05 × 0.35 ≈ 0.17
    "2": 0.34
    "3": 0.51
    "4": 0.68
    mean_weight_assumption: 2.05
    base_rate_assumption: 0.35
    notes: "RECOMPUTE per quarterly run from actual wage-level mix observed in DOL data"

# ----------------------------------------------------------------------------
# Cap-exempt subcategories (per 8 CFR 214.2(h)(19)(iii)(C) — updated Dec 2024)
# The "Modernizing H-1B" final rule (89 FR 100024, 2024-12-18) replaced
# "primarily engaged" and "primary mission" with "fundamental activity" —
# a LOOSER test. More nonprofits now qualify as nonprofit research orgs.
# Citation: 8 CFR 214.2(h)(8)(iii)(F)(2)(iv), (h)(8)(iii)(F)(4),
#           (h)(19)(iii)(B)(4), (h)(19)(iii)(C)
# ----------------------------------------------------------------------------
cap_exempt:
  rule_citation: "8 CFR 214.2(h)(19)(iii)(C) per 89 FR 100024 (2024-12-18)"
  rule_effective_date: "2025-01-17"
  fundamental_activity_test: true   # 2024 modernization rule applies
  rule_verified_at: "2026-05-27"
  subcategories:
    - HIGHER_ED
    - AFFILIATED_NONPROFIT
    - NONPROFIT_RESEARCH
    - GOVT_RESEARCH
    - NONE
  confidence_floors:
    HIGHER_ED: HIGH
    AFFILIATED_NONPROFIT: MEDIUM
    NONPROFIT_RESEARCH: MEDIUM   # raised from LOW given looser fundamental-activity test
    GOVT_RESEARCH: MEDIUM
    NONE: HIGH

# ----------------------------------------------------------------------------
# Staffing-firm heuristic
# ----------------------------------------------------------------------------
staffing_firm:
  naics_codes: [541512, 541513, 541519]
  level1_share_min: 0.50
  volume_min: 100
  # Manual overrides (extend via /data/manifest/corporate_groups.yaml)
  known_staffing_overrides:
    - "COGNIZANT TECHNOLOGY SOLUTIONS"
    - "INFOSYS"
    - "TATA CONSULTANCY SERVICES"
    - "WIPRO"
    - "HCL TECHNOLOGIES"
    - "TECH MAHINDRA"
    - "LARSEN AND TOUBRO INFOTECH"
    - "CAPGEMINI"
    - "MPHASIS"
    - "ACCENTURE FEDERAL SERVICES"
    - "DELOITTE CONSULTING"
    - "MINDTREE"
    - "IGATE"
    - "SYNTEL"
    - "ZENSAR TECHNOLOGIES"

# ----------------------------------------------------------------------------
# Schema validation bounds (pandera)
# ----------------------------------------------------------------------------
validation:
  wage_min_annual: 15000
  wage_max_annual: 1000000
  decision_date_min: "2010-01-01"
  null_rate_critical_max: 0.01
  null_rate_file_corrupt: 0.80

# ----------------------------------------------------------------------------
# Smoke-test alerting
# ----------------------------------------------------------------------------
smoke:
  mart_row_count_delta_alert: 0.20

